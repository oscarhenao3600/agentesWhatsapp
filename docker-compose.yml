services:
  # Base de Datos MongoDB (SEGURA: Sin puertos expuestos al exterior)
  mongodb:
    image: mongo:latest
    container_name: mongodb
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # Backend (Node.js)
  backend:
    build: ./backend
    container_name: whatsapp_backend
    ports:
      - "4000:4000" # Puerto de producción personalizado
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/agentes_whatsapp
      - PORT=4000
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    restart: unless-stopped

  # Frontend (React + Nginx)
  frontend:
    build: ./frontend
    container_name: whatsapp_frontend
    ports:
      - "8080:80" # Acceso externo por el puerto 8080
    depends_on:
      - backend
    restart: unless-stopped

